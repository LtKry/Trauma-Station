    enabled: true
    damage:
      types:
        Heat: 15
  - type: Temperature
    currentTemperature: 2300
  - type: ChangeOnCool
    coolTemp: 2000
    cooledPrototype: AnvilTopIntermediarytoCold

- type: entity  ## Needs these so it doesnt break everything sadly
  parent: BaseForgeItemNoTemp
  id: AnvilTopIntermediarytoHot
  categories: [HideSpawnMenu]
  components:
  - type: TimedDespawn
    lifetime: 0.1
  - type: SpawnOnDespawn
    prototype: AnvilTopHot
  - type: Sprite
    state: anvil_top_hot

- type: entity  ## Needs these so it doesnt break everything sadly
  parent: BaseForgeItemNoTemp
  id: AnvilTopIntermediarytoCold
  categories: [HideSpawnMenu]
  components:
  - type: TimedDespawn
    lifetime: 0.1
  - type: SpawnOnDespawn
    prototype: AnvilTop
  - type: Sprite
    state: anvil_top

- type: entity
  parent: BaseForgeItemCold
  id: AnvilTop
  name: anvil top
  description: The top part of an anvil.
  components:
