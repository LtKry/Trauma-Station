# Base
- type: entity
  parent: BaseItem
  id: BaseForgeItemNoTemp
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/forging.rsi

- type: entity
  parent: BaseItem
  id: BaseForgeItem
  abstract: true
  components:
  - type: AtmosExposed
  - type: Temperature
    currentTemperature: 290
    specificHeat: 500
    atmosTemperatureTransferEfficiency: 0.005
  - type: InternalTemperature
    thickness: 1
    area: 1
    conductivity: 1000
  - type: Sprite
    sprite: _Trauma/Objects/Specific/forging.rsi

- type: entity
  parent: BaseForgeItem
  id: BaseForgeItemCold
  abstract: true
  components:
  - type: BurnableFood
    burnedPrefix: heated-name-text
    burnSound: null
    burnedPopup: heated-popup-text

- type: entity
  parent: BaseForgeItem
  id: BaseForgeItemHot
  abstract: true
  components:
  - type: DamageOnHolding # Need immunity component for some gloves
    enabled: true
    damage:
      types:
        Heat: 5
  - type: PointLight
    radius: 1.4
    energy: 7
    color: "#ff8227"

# Brass - 100 range of error for overheating, 100 range of error for cooling

- type: entity
  id: BrassOverheatable
  abstract: true
  components:
  - type: BurnableFood
    burnTemp: 1660
    burnedFoodPrototype: OverheatedBrass
    burnedPrefix: heated-name-text
    burnSound: null

- type: entity
  parent: BaseForgeItemNoTemp
  id: BrassScraps
  name: brass scraps
  description: Needs to be melted in a bloomery to be made useful.
  components:
  - type: Tag
    tags:
    - BrassScraps
  - type: Sprite
    state: brass
  - type: Construction
    graph: BrassScraps
    node: start

- type: entity
  parent: BaseForgeItemNoTemp
  id: OverheatedBrass
  name: overheated brass
  description: The metal has overheated and become brittle, smash it apart to make it usable.
  components:
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          BrassScraps:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    state: brassbrittle

- type: entity
  parent: [BaseForgeItemHot, BrassOverheatable]
  id: BrassBloom
  name: brass bloom
  description: Refine it by smashing it with a hammer into shape!
  components:
  - type: Temperature
    currentTemperature: 1560
  - type: ChangeOnCool
    coolTemp: 1460
    cooledPrototype: BrassBloomIntermediarytoCold
  - type: Sprite
    state: bloombrasshot
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          BrassIngot:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity  ## Needs these so it doesnt break everything sadly
  parent: BaseForgeItemNoTemp
  id: BrassBloomIntermediarytoHot
  categories: [HideSpawnMenu]
  components:
  - type: Sprite
    state: bloombrasshot
  - type: TimedDespawn
    lifetime: 0.1
  - type: SpawnOnDespawn
    prototype: BrassBloom

- type: entity  ## Needs these so it doesnt break everything sadly
  parent: BaseForgeItemNoTemp
  id: BrassBloomIntermediarytoCold
  categories: [HideSpawnMenu]
  components:
  - type: TimedDespawn
    lifetime: 0.1
  - type: SpawnOnDespawn
    prototype: BrassBloomCold
  - type: Sprite
    state: bloombrass

- type: entity
  parent: BaseForgeItemCold
  id: BrassBloomCold
  name: cold brass bloom
  description: Needs to be warmed back up to be workable.
  components:
  - type: Temperature
    currentTemperature: 1460
  - type: BurnableFood
    burnTemp: 1560
    burnedFoodPrototype: BrassBloomIntermediarytoHot
  - type: Sprite
    state: bloombrass

- type: entity
  parent: [BaseForgeItemHot, BrassOverheatable, MaterialBase]
  id: BrassIngot
  name: brass ingot
  description: A softer piece of metal, ready to be forged.
  components:
  - type: Temperature
    currentTemperature: 1560
  - type: ChangeOnCool
    coolTemp: 1460
    cooledPrototype: BrassIngotIntermediarytoCold
  - type: Sprite
    state: ingot_brass_hot
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      BrassIngot: 100
  - type: Stack
    stackType: BrassIngot
    count: 1

- type: entity  ## Needs these so it doesnt break everything sadly
  parent: BaseForgeItemNoTemp
  id: BrassIngotIntermediarytoHot
  categories: [HideSpawnMenu]
  components:
  - type: TimedDespawn
    lifetime: 0.1
  - type: SpawnOnDespawn
    prototype: BrassIngot
  - type: Sprite
    state: ingot_brass_hot

- type: entity  ## Needs these so it doesnt break everything sadly
  parent: BaseForgeItemNoTemp
  id: BrassIngotIntermediarytoCold
  categories: [HideSpawnMenu]
  components:
  - type: TimedDespawn
    lifetime: 0.1
  - type: SpawnOnDespawn
    prototype: BrassIngotCold
  - type: Sprite
    state: ingot_brass

- type: entity
  parent: BaseForgeItemCold
  id: BrassIngotCold
  name: cold brass ingot
  description: Needs to be warmed back up to be workable.
  components:
  - type: Temperature
    currentTemperature: 1460
  - type: BurnableFood
    burnTemp: 1560
    burnedFoodPrototype: BrassIngotIntermediarytoHot
  - type: Sprite
    state: ingot_brass

