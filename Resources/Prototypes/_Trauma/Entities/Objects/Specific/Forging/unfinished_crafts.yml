# Base

- type: entity
  parent: [BaseForgeItemHot, BrassOverheatable]
  id: BaseBrassUnfinishedHot
  abstract: true
  description: Finish it by smashing it into shape with a hammer!
  components:
  - type: Temperature
    currentTemperature: 1560
  - type: ChangeOnCool
    coolTemp: 1460
    cooledPrototype: BrassIngotIntermediarytoCold
  - type: Sprite
    state: ingot_brass_hot
  - type: Damageable

- type: entity
  parent: [BaseForgeItemHot, SteelOverheatable]
  id: BaseSteelUnfinishedHot
  abstract: true
  description: Finish it by smashing it into shape with a hammer!
  components:
  - type: Temperature
    currentTemperature: 2300
  - type: ChangeOnCool
    coolTemp: 2275
    cooledPrototype: SteelIngotIntermediarytoCold
  - type: Sprite
    state: ingot_steel_hot
  - type: Damageable

- type: entity
  parent: [BaseForgeItemHot, PlasteelOverheatable]
