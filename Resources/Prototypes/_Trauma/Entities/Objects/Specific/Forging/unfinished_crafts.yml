    currentTemperature: 2700
  - type: ChangeOnCool
    coolTemp: 2650
    cooledPrototype: PlasteelIngotIntermediarytoCold
  - type: Sprite
    state: ingot_plasteel_hot
  - type: Damageable

- type: entity
  parent: [BaseForgeItemHot, BrassOverheatable]
  id: BaseBrassHot
  abstract: true
  description: Let it cool for a while or quench it.
  components:
  - type: Temperature
    currentTemperature: 1560
  - type: ChangeOnCool
    coolTemp: 100
  - type: Sprite
    color: "#ff9d57"
    shader: unshaded
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#ff9d57"
        shader: unshaded
      right:
      - state: inhand-right
        color: "#ff9d57"
        shader: unshaded

- type: entity
  parent: [BaseForgeItemHot, SteelOverheatable]
