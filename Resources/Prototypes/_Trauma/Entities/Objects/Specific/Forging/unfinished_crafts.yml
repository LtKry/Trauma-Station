- type: entity
  parent: BaseBrassUnfinishedHot
  id: KnifeBladeBrassUnfinishedHot
  name: unfinished brass knife blade
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          KnifeBladeBrassHot:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

