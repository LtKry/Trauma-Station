# Screwdriver

- type: entity
  parent: BaseItem
  id: BaseForgeScrewdriver
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/screwdriver.rsi
  - type: Item
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/screwdriver.rsi
    storedRotation: -90
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/screwdriver_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/screwdriver_drop.ogg
  - type: Retractor
    speed: 0.45
  - type: Tending
    speed: 0.65
  - type: Screwdriver
  - type: SurgeryTool
    startSound:
      collection: Screwdriver
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/retractor2.ogg
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        hard: false
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: ThrowingAngle
    angle: -90
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
    removalTime: 1.5
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 8
        Structural: 1
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/screwdriver_drop.ogg
  - type: Tag
    tags:
    - Screwdriver
    - DroneUsable
  - type: MeleeWeapon
    animationRotation: -90
    wideAnimationRotation: -90
    attackRate: 1
    damage:
      types:
        Piercing: 6
    soundHit:
      path: "/Audio/Weapons/bladeslice.ogg"
  - type: Tool
    qualities:
      - Screwing
    useSound:
      collection: Screwdriver
  - type: StaticPrice
    price: 30

- type: entity
  parent: [BaseForgeScrewdriver, BaseForgedBrass]
  id: BrassForgeScrewdriver
  name: brass screwdriver
