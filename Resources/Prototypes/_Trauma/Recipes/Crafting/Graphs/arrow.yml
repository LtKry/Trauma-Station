# Arrows
# TODO: make all this shit generic, it should just require any arrow head and have code properly combine them

- type: constructionGraph
  id: ForgeArrow
  start: start
  graph:
  - node: start
    edges:
    - to: handle
      steps:
      - tag: HandleSmall
        doAfter: 1
        name: construction-graph-tag-smallhandle
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: handlesmall

  - node: handle
    entity: ArrowCraftStart
    edges:

    - to: arrowbrass
      steps:
      - tag: ArrowHeadBrass
        doAfter: 3
        name: construction-graph-tag-arrowhead
        icon:
          sprite: _Trauma/Objects/Specific/Forging/Unfinished/arrowheads.rsi
          state: icon
      - material: Cloth
        amount: 1
        doAfter: 1

    - to: arrowsteel
      steps:
      - tag: ArrowHeadSteel
        doAfter: 3
        name: construction-graph-tag-arrowhead
        icon:
          sprite: _Trauma/Objects/Specific/Forging/Unfinished/arrowheads.rsi
          state: icon
      - material: Cloth
        amount: 1
        doAfter: 1

    - to: arrowplasteel
      steps:
      - tag: ArrowHeadPlasteel
        doAfter: 3
        name: construction-graph-tag-arrowhead
        icon:
          sprite: _Trauma/Objects/Specific/Forging/Unfinished/arrowheads.rsi
          state: icon
      - material: Cloth
        amount: 1
        doAfter: 1

  - node: arrowbrass
    entity: ForgeArrowBrass

  - node: arrowsteel
    entity: ForgeArrowSteel

  - node: arrowplasteel
    entity: ForgeArrowPlasteel
