# Forge Sword

- type: constructionGraph
  id: ForgeSword
  start: start
  graph:
  - node: start
    edges:
    - to: handle
      steps:
      - tag: HandleSmall
        doAfter: 10
        name: construction-graph-tag-smallhandle
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: handlesmall

  - node: handle
    entity: SwordCraftStart
    edges:


    - to: swordbrass
      steps:
      - tag: SwordBladeBrass
        doAfter: 3
        name: construction-graph-tag-swordblade
        icon:
          sprite: _Trauma/Objects/Specific/Forging/Unfinished/sword_blade.rsi
          state: icon

    - to: swordsteel
      steps:
      - tag: SwordBladeSteel
        doAfter: 3
        name: construction-graph-tag-swordblade
        icon:
          sprite: _Trauma/Objects/Specific/Forging/Unfinished/sword_blade.rsi
          state: icon

    - to: swordplasteel
